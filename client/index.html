<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="description" content="Pitch Intelligence — soccer analytics: an Expected Goals (xG) dashboard and Soccer Vision 3D interactive tactical analysis." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Pitch Intelligence — Soccer Analytics in 3D</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Fira+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <script>
      // Apply the saved theme before first paint to avoid a flash of the wrong theme.
      (function () {
        try {
          var saved = localStorage.getItem('xg-theme');
          var theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
