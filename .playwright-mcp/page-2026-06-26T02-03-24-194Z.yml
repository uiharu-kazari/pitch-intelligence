              - text: Net xG (xG for − xG against) is the strongest predictor of league position and future results.
            - listitem [ref=e419]:
              - strong [ref=e420]: Elite chance creation.
              - text: Top sides generate far more expected goals while suppressing their opponents' chances.
            - listitem [ref=e421]:
              - strong [ref=e422]: Conversion is volatile.
              - text: Even elite teams rarely sustain more than 1.3× their xG — finishing regresses toward the mean.
            - listitem [ref=e423]:
              - strong [ref=e424]: Sustainable success.
              - text: A positive net xG signals durable form; teams scoring above their xG are likely to cool off.
